name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: local
    permissions:
      contents: read
      packages: write
    
    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Validate Docker secrets
      - name: Validate Docker secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "❌ ERROR: DOCKER_USERNAME secret is missing!"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ ERROR: DOCKER_PASSWORD secret is missing!"
            exit 1
          fi
          echo "✅ Docker secrets found. Continuing..."

      # 3️⃣ Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build Docker image
      - name: Build Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/$(echo "subk-TimeSheet" | tr '[:upper:]' '[:lower:]')
          echo "Building image: $IMAGE_NAME"
          docker build . --file Dockerfile \
            --tag $IMAGE_NAME:latest

      # 5️⃣ Push Docker image
      - name: Push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/$(echo "subk-TimeSheet" | tr '[:upper:]' '[:lower:]')
          echo "Pushing image: $IMAGE_NAME"
          docker push $IMAGE_NAME:latest

      # 6️⃣ Optional: Verify pushed image
      - name: Verify image pushed
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/$(echo "subk-TimeSheet" | tr '[:upper:]' '[:lower:]')
          echo "✅ Pushed images:"
          docker images | grep $IMAGE_NAME
